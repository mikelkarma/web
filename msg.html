<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulação de Mapa</title>
    <style>
        body {
            font-family: monospace;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
        }
        #map {
            white-space: pre;
            background: black;
            color: white;
            padding: 10px;
            overflow: auto;
            width: 50ch;
            height: 25ch;
        }
        #commands {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div id="banner"></div>
    <div id="map"></div>
    <div id="commands"></div>
    <input type="text" id="input" placeholder="Digite um comando">
    <button onclick="executeCommand()">Enviar</button>

    <script>
        const MAP_WIDTH = 50;
        const MAP_HEIGHT = 25;
        const PLAYER_SYMBOL = '👾';
        const OBJECT_SYMBOL = '#';
        const WALL_HORIZONTAL = '-';
        const WALL_VERTICAL = '|';
        const WALL_CORNER_TOP_LEFT = '┏';
        const WALL_CORNER_TOP_RIGHT = '┓';
        const WALL_CORNER_BOTTOM_LEFT = '┗';
        const WALL_CORNER_BOTTOM_RIGHT = '┛';

        let playerPos = { x: Math.floor(MAP_WIDTH / 2), y: Math.floor(MAP_HEIGHT / 2) };
        let objects = [];
        let angleCurrent = 0;
        const commands = [];
        const speed = 0.4; // velocidade em unidades por segundo
        const timeTotal = 4.3;

        function drawMap() {
            let mapGrid = Array.from({ length: MAP_HEIGHT }, () => Array(MAP_WIDTH).fill(' '));

            // Desenha paredes
            for (let y = 0; y < MAP_HEIGHT; y++) {
                mapGrid[y][0] = WALL_VERTICAL;
                mapGrid[y][MAP_WIDTH - 1] = WALL_VERTICAL;
            }
            for (let x = 0; x < MAP_WIDTH; x++) {
                mapGrid[0][x] = WALL_HORIZONTAL;
                mapGrid[MAP_HEIGHT - 1][x] = WALL_HORIZONTAL;
            }

            // Canto das paredes
            mapGrid[0][0] = WALL_CORNER_TOP_LEFT;
            mapGrid[0][MAP_WIDTH - 1] = WALL_CORNER_TOP_RIGHT;
            mapGrid[MAP_HEIGHT - 1][0] = WALL_CORNER_BOTTOM_LEFT;
            mapGrid[MAP_HEIGHT - 1][MAP_WIDTH - 1] = WALL_CORNER_BOTTOM_RIGHT;

            // Posição do player
            mapGrid[playerPos.y][playerPos.x] = PLAYER_SYMBOL;

            // Adiciona objetos
            objects.forEach(([angle, distance]) => {
                const objX = Math.round(playerPos.x + distance * Math.cos(angle * Math.PI / 180));
                const objY = Math.round(playerPos.y + distance * Math.sin(angle * Math.PI / 180));
                if (objX >= 0 && objX < MAP_WIDTH && objY >= 0 && objY < MAP_HEIGHT) {
                    mapGrid[objY][objX] = OBJECT_SYMBOL;
                }
            });

            document.getElementById('map').textContent = mapGrid.map(row => row.join('')).join('\n');
        }

        function addObject(angle, distance) {
            objects.push([angle, distance]);
        }

        function executeCommand() {
            const cmd = document.getElementById('input').value;
            document.getElementById('input').value = '';

            if (cmd.startsWith('girar')) {
                const angle = parseFloat(cmd.split(' ')[1]);
                angleCurrent = (angleCurrent + angle) % 360;
                logCommand(`girando para ${angle} graus`);
            } else if (cmd.startsWith('frente')) {
                const distance = parseFloat(cmd.split(' ')[1]);
                logCommand(`movendo para frente por ${distance} metros`);
                // Simulação simples
            } else if (cmd === 'scan') {
                objects = []; // Resetar objetos
                for (let angle = 0; angle < 360; angle += 1) {
                    addObject(angle, 5);
                }
            }
            updateBanner();
            drawMap();
        }

        function logCommand(command) {
            commands.push(command);
            if (commands.length > 7) {
                commands.shift();
            }
            updateCommands();
        }

        function updateCommands() {
            document.getElementById('commands').innerHTML = commands.map(cmd => `<div>- ${cmd}</div>`).join('');
        }

        function updateBanner() {
            document.getElementById('banner').innerHTML = `
                <strong>Ângulo Atual:</strong> ${angleCurrent} <br>
                <strong>Objetos:</strong> ${objects.length}
            `;
        }

        // Inicializa o mapa
        drawMap();
    </script>
</body>
</html>
