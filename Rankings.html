<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ranking da Guild Demon</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">
  <div class="max-w-2xl mx-auto mt-10 px-4 sm:px-6 lg:px-8">
    <div class="text-center mb-8">
      <h1 class="text-2xl sm:text-3xl font-bold mb-2">🏅 Ranking da Guild: <span class="text-indigo-600">Demon</span></h1>
      <p class="text-sm text-gray-500">Quer participar do sistema de rankeamento? Me chama no PV! Dmn Narkiel</p>
    </div>

    <div id="rankingsContainer" class="space-y-6"></div>
  </div>

  <script>
    const medalhas = ["🥇", "🥈", "🥉"];

    const categorias = {
      "Kina (melee)": [
        { nome: "dmn antares", skill: "Kina" },
        { nome: "dmn narkiel", skill: "Kina" },
        { nome: "Raphaelggu", skill: "Kina" },
        { nome: "Tankcuzim", skill: "Kina" },
      ],
      "Mage (magic)": [
        { nome: "Dmn Shin", skill: "Mage" },
        { nome: "lorddix", skill: "Mage" },
        { nome: "Sem dormir", skill: "Mage" },
        { nome: "Dmn Calango", skill: "Mage" },
        { nome: "The Katre", skill: "Mage" },
        { nome: "Sun Blede", skill: "Mage" },
        { nome: "dmn narkiel", skill: "Mage" },
      ],
      "Pally (distance)": [
        { nome: "dmn narkiel", skill: "Pally" },
        { nome: "Ociastwo", skill: "Pally" },
      ],
      "Def (defense)": [
        { nome: "lorddix", skill: "Def" },
        { nome: "Sem dormir", skill: "Def" },
        { nome: "dmn narkiel", skill: "Def" },
        { nome: "The Katre", skill: "Def" },
        { nome: "Raphaelggu", skill: "Def" },
        { nome: "Dmn Calango", skill: "Def" },
        { nome: "Sun Blede", skill: "Def" },
        { nome: "Tankcuzim", skill: "Def" },
        { nome: "Ociastwo", skill: "Def" },
      ],
    };

    const container = document.getElementById("rankingsContainer");

    for (const [categoria, jogadores] of Object.entries(categorias)) {
      const section = document.createElement("div");
      section.className = "bg-white border border-gray-200 rounded-lg shadow-sm";

      section.innerHTML = `
        <div class="bg-gray-100 px-4 py-2 rounded-t-md">
          <h2 class="text-lg font-semibold">${categoria}</h2>
        </div>
        <ul class="divide-y divide-gray-100" id="lista-${categoria.replace(/\W+/g, '')}"></ul>
      `;

      container.appendChild(section);

      const lista = section.querySelector("ul");

      jogadores.forEach((jogador, i) => {
        const li = document.createElement("li");
        li.className = "flex items-center px-4 py-3";

        const medalha = medalhas[i] || `${i + 1}.`;

        li.innerHTML = `
          <span class="w-8 font-bold text-lg">${medalha}</span>
          <div class="ml-2">
            <p class="text-base font-medium truncate max-w-[80vw]">${jogador.nome}</p>
            <p class="text-sm text-gray-500">${jogador.skill}</p>
          </div>
        `;

        lista.appendChild(li);
      });
    }
  </script>
</body>
</html>
